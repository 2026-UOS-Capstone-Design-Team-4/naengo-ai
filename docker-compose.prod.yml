services:
  naengo-ai:
    build: .
    image: naengo-ai
    container_name: naengo-ai
    restart: always
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./global-bundle.pem:/app/global-bundle.pem:ro
