services:
  naengo-ai:
    image: ${NAENGO_AI_IMAGE:-ghcr.io/2026-uos-capstone-design-team-4/naengo-ai:latest}
    container_name: naengo-ai
    restart: always
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./global-bundle.pem:/app/global-bundle.pem:ro
