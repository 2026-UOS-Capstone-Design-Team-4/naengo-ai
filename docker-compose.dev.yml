services:
  naengo-ai:
    build: .
    image: naengo-ai-dev
    container_name: naengo-ai-dev
    restart: unless-stopped
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - naengo-ai-venv:/app/.venv
      - ./global-bundle.pem:/app/global-bundle.pem:ro

volumes:
  naengo-ai-venv:
